# 按目录分流：改 backend 才构建/推送后端镜像并（可选）触发 Render；改 frontend 不碰后端。
# 前端生产部署走 Vercel（不在此 workflow 里构建前端镜像）。
#
# Render Deploy Hook（仅在后端 job 成功时）：
#   Variable  ENABLE_RENDER_DEPLOY_HOOK = true
#   Secret    RENDER_DEPLOY_HOOK_URL
#
# 手动 Run workflow：强制构建并推送 backend 镜像。

name: Docker build / push / deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/docker-build-deploy.yml'

  build-backend:
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'
    outputs:
      backend_tag: ${{ steps.tags.outputs.backend_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Registry namespace (GHCR requires lowercase path)
        id: ns
        run: echo "repository_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Image tags for this revision
        id: tags
        run: |
          R="${{ steps.ns.outputs.repository_lower }}"
          echo "backend_tag=${{ env.REGISTRY }}/${R}/backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.tags.outputs.backend_tag }}
            ${{ env.REGISTRY }}/${{ steps.ns.outputs.repository_lower }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  render-deploy-hook:
    runs-on: ubuntu-latest
    needs: build-backend
    if: |
      needs.build-backend.result == 'success' &&
      vars.ENABLE_RENDER_DEPLOY_HOOK == 'true'
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          set -e
          if [ -z "${HOOK_URL:-}" ]; then
            echo "::error::ENABLE_RENDER_DEPLOY_HOOK is true but RENDER_DEPLOY_HOOK_URL secret is empty."
            exit 1
          fi
          curl --fail-with-body -sS -X POST "${HOOK_URL}"

# Render Blueprint: https://render.com/docs/yaml-spec
#
# Deploy: Dashboard → Blueprints → New → connect repo → use this file, or CLI.
# Set secret env vars in the Render dashboard (DATABASE_URL, OPENAI_API_KEY, …).

services:
  - type: web
    name: fomo-backend
    runtime: docker
    region: oregon
    plan: free
    branch: main
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /api/health
    # Apply DB migrations on each deploy, then start the API (adjust plan/region above as needed).
    # Prefer image CMD (/app/scripts/docker-entrypoint.sh). Override only if needed:
    # dockerCommand: /app/scripts/docker-entrypoint.sh
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # ── Paste in Dashboard or use sync from secret store ─────────────────────
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # CORS: your deployed frontend origin(s), comma-separated (e.g. https://xxx.vercel.app)
      - key: CORS_ORIGINS
        sync: false
      # 火山方舟：`ark` → .../embeddings/multimodal + 豆包多模态模型；与 LLM 共用 OPENAI_API_KEY / OPENAI_BASE_URL
      - key: EMBEDDING_PROVIDER
        value: ark
      - key: OPENAI_BASE_URL
        sync: false
        optional: true
      - key: LLM_MODEL
        sync: false
        optional: true
      # Optional integrations
      - key: TELEGRAM_BOT_TOKEN
        sync: false
        optional: true
      - key: TELEGRAM_CHAT_ID
        sync: false
        optional: true
      - key: WECOM_WEBHOOK_URL
        sync: false
        optional: true
